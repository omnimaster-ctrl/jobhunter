<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JobHunter Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>JobHunter</h2>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Overview</a></li>
            <li><a href="/funnel" class="{% if request.url.path == '/funnel' %}active{% endif %}">Funnel</a></li>
            <li><a href="/scores" class="{% if request.url.path == '/scores' %}active{% endif %}">Scores</a></li>
            <li><a href="/timeline" class="{% if request.url.path == '/timeline' %}active{% endif %}">Timeline</a></li>
            <li><a href="/breakdown" class="{% if request.url.path == '/breakdown' %}active{% endif %}">Breakdown</a></li>
        </ul>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
